name: Deploy To VPS

on:
  # Auto-deploy on push is disabled for the public showcase repo.
  # Configure the VPS_HOST, VPS_USER, VPS_SSH_KEY and APP_DOMAIN secrets
  # (see deployment/DEPLOYMENT.md), then uncomment the push trigger to deploy
  # automatically on every push to main.
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/opt/luciobriefcase"
          rm: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/luciobriefcase
            chmod +x ops/deploy_vps.sh
            DOMAIN=${{ secrets.APP_DOMAIN }} ./ops/deploy_vps.sh ${{ secrets.APP_DOMAIN }}
